name: Deploy to production

# Production is release-gated. Publishing a GitHub Release deploys that exact tag to the
# production resource group. The `production` GitHub Environment enforces required reviewers,
# and the run fails unless the deployed app reports the released version at /version.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Git tag/ref to deploy (e.g. v1.2.0)
        required: true

permissions:
  id-token: write   # Azure OIDC login
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  deploy:
    name: Deploy (production)
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Resolve release ref
        id: ref
        run: |
          REF="${{ github.event.release.tag_name || inputs.ref }}"
          if [ -z "$REF" ]; then echo "::error::No release ref to deploy."; exit 1; fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Deploying ref: $REF"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Preview deployment steps
        env:
          Azure__SubscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          Azure__Location: ${{ vars.AZURE_LOCATION }}
          Azure__ResourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          aspire ls
          aspire deploy --apphost ./apphost.cs --environment production --list-steps

      - name: Deploy with Aspire
        env:
          APP_VERSION: ${{ steps.ref.outputs.ref }}
          Azure__SubscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          Azure__Location: ${{ vars.AZURE_LOCATION }}
          Azure__ResourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: aspire deploy --apphost ./apphost.cs --environment production --non-interactive

      - name: Verify the released version is live
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          EXPECTED_VERSION: ${{ steps.ref.outputs.ref }}
        run: |
          chmod +x ./.github/scripts/verify-deployment.sh
          ./.github/scripts/verify-deployment.sh
