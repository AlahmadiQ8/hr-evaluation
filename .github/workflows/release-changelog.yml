name: Release changelog (AI)

# When a release is published, summarize the commits since the previous release into a
# human-friendly changelog using GitHub Models (via actions/ai-inference), then update the
# release notes. Runs independently of the production deploy.
on:
  release:
    types: [published]

permissions:
  contents: write   # edit the release notes
  models: read      # GitHub Models inference

concurrency:
  group: release-changelog-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  changelog:
    name: Generate human-friendly changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags for the commit range

      - name: Collect commits since the previous release
        id: log
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
            echo "Commit range: ${RANGE}"
          else
            RANGE="$TAG"
            echo "No previous tag found; summarizing history up to ${TAG}."
          fi
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "commits<<__EOF__"
            git log --no-merges -n 300 --pretty=format:'- %s' "$RANGE"
            echo ""
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Generate changelog with GitHub Models
        id: ai
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          system-prompt: |
            You are a release-notes writer for "Taqyeem", a bilingual (Arabic/English) employee
            performance-evaluation demo web app built on .NET Aspire (ASP.NET Core API + Blazor).
            Turn raw git commit messages into a concise, human-friendly changelog for a general
            audience. Group changes under clear Markdown headings such as Features, Improvements,
            Fixes, and Internal. Use plain language, one bullet per change, no commit hashes and no
            author names. Omit purely mechanical commits (merge, version bump, formatting) unless
            they are user-facing. If nothing user-facing changed, say so briefly. Output
            GitHub-flavored Markdown only, with no preamble.
          prompt: |
            Release ${{ github.event.release.tag_name }} of Taqyeem.
            Raw commit messages since ${{ steps.log.outputs.prev_tag || 'the beginning of the project' }}:

            ${{ steps.log.outputs.commits }}

      - name: Update the release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          AI_NOTES: ${{ steps.ai.outputs.response }}
        run: |
          set -euo pipefail
          CURRENT=$(gh release view "$TAG" --json body -q .body 2>/dev/null || true)
          {
            echo "## What's changed"
            echo ""
            printf '%s\n' "$AI_NOTES"
            if [ -n "$CURRENT" ]; then
              echo ""
              echo "<details><summary>Original release notes</summary>"
              echo ""
              printf '%s\n' "$CURRENT"
              echo ""
              echo "</details>"
            fi
            echo ""
            echo "_🤖 Changelog generated by GitHub Models (\`openai/gpt-4o\`) via \`actions/ai-inference\`._"
          } > release-notes.md
          gh release edit "$TAG" --notes-file release-notes.md
