name: Deploy to staging

# Staging is continuously deployed: whenever CI succeeds on `main`, the exact commit that
# passed CI is deployed to the staging resource group via Aspire, then verified.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # Azure OIDC login
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  deploy:
    name: Deploy (staging)
    # Only deploy when the triggering CI run succeeded (manual dispatch always runs).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Resolve commit
        id: sha
        run: echo "sha=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.sha.outputs.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy with Aspire
        env:
          APP_VERSION: staging-${{ steps.sha.outputs.sha }}
          Azure__SubscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          Azure__Location: ${{ vars.AZURE_LOCATION }}
          Azure__ResourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: aspire deploy --apphost ./apphost.cs --environment staging --non-interactive

      - name: Verify deployment (health + version)
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          EXPECTED_VERSION: staging-${{ steps.sha.outputs.sha }}
        run: |
          chmod +x ./.github/scripts/verify-deployment.sh
          ./.github/scripts/verify-deployment.sh
